name: CAISY AI Automated Gatekeeper Scan

# Trigger the security gate loop automatically on every push or pull request
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-audit:
    runs-on: windows-latest

    steps:
    - name: 📥 Checkout repository source files
      uses: actions/checkout@v4

    - name: ⚙️ Set up Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        if (Test-Path requirements.txt) { pip install -r requirements.txt }

    - name: 🛡️ Execute CAISY AI Self-Healing Scan
      shell: bash
      run: |
        echo "===================================================="
        echo "🚀 INITIALIZING CAISY LOCAL AI PIPELINE..."
        echo "===================================================="
        
        # This targets and runs your existing shell script in the cloud sandbox
        chmod +x ./caisy_engine.sh
        ./caisy_engine.sh

    - name: 📡 Synchronize Status Logs
      run: |
        echo "Synchronization with GitHub Actions monitoring pipeline complete."
